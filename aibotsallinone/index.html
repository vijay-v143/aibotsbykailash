<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Multi-AI Chat</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: #0f0f1a;
    color: #eee;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    padding: 14px 24px;
    background: #13132b;
    border-bottom: 1px solid #2a2a4a;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  header h1 { font-size: 1.15rem; color: #fff; flex: 1; }

  /* ── AI Selector Buttons ── */
  .ai-selector { display: flex; gap: 8px; }

  .ai-btn {
    padding: 7px 18px;
    border-radius: 20px;
    border: 2px solid transparent;
    cursor: pointer;
    font-size: 0.82rem;
    font-weight: 700;
    letter-spacing: 0.03em;
    transition: all 0.2s;
    background: #1e1e3a;
  }

  .ai-btn.claude  { color: #c084fc; border-color: #3b0764; }
  .ai-btn.chatgpt { color: #34d399; border-color: #064e3b; }
  .ai-btn.gemini  { color: #60a5fa; border-color: #1e3a8a; }

  .ai-btn.active.claude  { background: #4c1d95; color: #fff; border-color: #7c3aed; }
  .ai-btn.active.chatgpt { background: #065f46; color: #fff; border-color: #10b981; }
  .ai-btn.active.gemini  { background: #1e40af; color: #fff; border-color: #3b82f6; }

  .ai-btn:hover { opacity: 0.85; transform: scale(1.03); }

  /* ── Chat Area ── */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 28px 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }

  #chat::-webkit-scrollbar { width: 5px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 4px; }

  /* ── Messages ── */
  .msg {
    max-width: 72%;
    padding: 12px 16px;
    border-radius: 18px;
    line-height: 1.6;
    font-size: 0.94rem;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  .msg.user {
    align-self: flex-end;
    background: linear-gradient(135deg, #4f46e5, #7c3aed);
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  .msg.ai { align-self: flex-start; border-bottom-left-radius: 4px; }

  .msg.claude  { background: #1e103a; border-left: 3px solid #c084fc; }
  .msg.chatgpt { background: #0a2018; border-left: 3px solid #34d399; }
  .msg.gemini  { background: #091428; border-left: 3px solid #60a5fa; }

  .msg-label {
    font-size: 0.68rem;
    font-weight: 800;
    margin-bottom: 5px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    opacity: 0.65;
  }

  .msg.claude  .msg-label { color: #c084fc; }
  .msg.chatgpt .msg-label { color: #34d399; }
  .msg.gemini  .msg-label { color: #60a5fa; }

  /* ── Typing indicator ── */
  .typing-dots span {
    display: inline-block;
    width: 7px; height: 7px;
    background: #888;
    border-radius: 50%;
    margin: 0 2px;
    animation: bounce 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-6px); }
  }

  /* ── Input Area ── */
  .input-area {
    padding: 14px 20px;
    background: #13132b;
    border-top: 1px solid #2a2a4a;
    display: flex;
    gap: 10px;
    align-items: center;
  }

  #input {
    flex: 1;
    padding: 12px 18px;
    border-radius: 14px;
    border: 1.5px solid #2a2a4a;
    background: #0f0f1a;
    color: #eee;
    font-size: 0.94rem;
    outline: none;
    transition: border-color 0.2s;
    resize: none;
    height: 48px;
    line-height: 1.4;
  }
  #input:focus { border-color: #6366f1; }

  #send {
    padding: 12px 22px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: #fff;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    font-weight: 700;
    font-size: 0.9rem;
    transition: opacity 0.2s, transform 0.1s;
    height: 48px;
  }
  #send:hover { opacity: 0.9; transform: scale(1.03); }
  #send:active { transform: scale(0.97); }

  /* ── Welcome message ── */
  .welcome {
    text-align: center;
    margin: auto;
    opacity: 0.4;
    pointer-events: none;
  }
  .welcome .icon { font-size: 3rem; margin-bottom: 12px; }
  .welcome p { font-size: 1rem; }

  /* ── Active AI indicator ── */
  .active-indicator {
    font-size: 0.75rem;
    padding: 4px 12px;
    border-radius: 20px;
    font-weight: 600;
    margin-left: 8px;
  }
  .indicator-claude  { background: #3b0764; color: #c084fc; }
  .indicator-chatgpt { background: #064e3b; color: #34d399; }
  .indicator-gemini  { background: #1e3a8a; color: #60a5fa; }
</style>
</head>
<body>

<header>
  <h1>🤖 Multi-AI Chat</h1>
  <span id="activeLabel" class="active-indicator indicator-claude">● Claude</span>
  <div class="ai-selector">
    <button class="ai-btn claude active" onclick="selectAI('claude', this)">Claude</button>
    <button class="ai-btn chatgpt" onclick="selectAI('chatgpt', this)">ChatGPT</button>
    <button class="ai-btn gemini" onclick="selectAI('gemini', this)">Gemini</button>
  </div>
</header>

<div id="chat">
  <div class="welcome" id="welcome">
    <div class="icon">💬</div>
    <p>Select an AI and start chatting!</p>
  </div>
</div>

<div class="input-area">
  <input id="input" placeholder="Type a message and press Enter..." onkeydown="if(event.key==='Enter' && !event.shiftKey){ event.preventDefault(); sendMessage(); }" />
  <button id="send" onclick="sendMessage()">Send ➤</button>
</div>

<script>
  let currentAI = 'claude';
  let history = [];
  const BACKEND = 'http://localhost:8000';

  const aiLabels = {
    claude:  { emoji: '🟣', name: 'Claude',  indicatorClass: 'indicator-claude' },
    chatgpt: { emoji: '🟢', name: 'ChatGPT', indicatorClass: 'indicator-chatgpt' },
    gemini:  { emoji: '🔵', name: 'Gemini',  indicatorClass: 'indicator-gemini' },
  };

  function selectAI(ai, btn) {
    currentAI = ai;
    document.querySelectorAll('.ai-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    const label = document.getElementById('activeLabel');
    label.textContent = `● ${aiLabels[ai].name}`;
    label.className = `active-indicator ${aiLabels[ai].indicatorClass}`;

    document.getElementById('input').placeholder = `Chat with ${aiLabels[ai].name}...`;
    document.getElementById('input').focus();
  }

  function addMessage(role, content, ai = null) {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = `msg ${role === 'user' ? 'user' : 'ai ' + ai}`;

    if (role !== 'user') {
      const label = document.createElement('div');
      label.className = 'msg-label';
      label.textContent = `${aiLabels[ai].emoji} ${aiLabels[ai].name}`;
      div.appendChild(label);
    }

    const textDiv = document.createElement('div');
    textDiv.textContent = content;
    div.appendChild(textDiv);

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  function addTyping(ai) {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = `msg ai ${ai}`;
    div.id = 'typing-indicator';

    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = `${aiLabels[ai].emoji} ${aiLabels[ai].name}`;
    div.appendChild(label);

    const dots = document.createElement('div');
    dots.className = 'typing-dots';
    dots.innerHTML = '<span></span><span></span><span></span>';
    div.appendChild(dots);

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  async function sendMessage() {
    const input = document.getElementById('input');
    const message = input.value.trim();
    if (!message) return;
    input.value = '';

    addMessage('user', message);
    history.push({ role: 'user', content: message });

    const typing = addTyping(currentAI);

    try {
      const res = await fetch(`${BACKEND}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message,
          ai: currentAI,
          history: history.slice(0, -1)
        })
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.detail || 'Server error');
      }

      const data = await res.json();
      typing.remove();
      addMessage('assistant', data.reply, currentAI);
      history.push({ role: 'assistant', content: data.reply });

    } catch (e) {
      typing.remove();
      addMessage('assistant', `❌ Error: ${e.message}. Make sure your backend is running at ${BACKEND}`, currentAI);
    }
  }
</script>
</body>
</html>
